const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function unlock(){
  const pw = document.getElementById("pw").value;
  const err = document.getElementById("err");
  err.textContent = "";
  try{
    const keyMat = await crypto.subtle.importKey("raw", new TextEncoder().encode(pw), "PBKDF2", false, ["deriveKey"]);
    const key = await crypto.subtle.deriveKey(
      {name:"PBKDF2", salt:b64(DATA.salt), iterations:200000, hash:"SHA-256"},
      keyMat, {name:"AES-GCM", length:256}, false, ["decrypt"]);
    const plain = await crypto.subtle.decrypt({name:"AES-GCM", iv:b64(DATA.iv)}, key, b64(DATA.ct));
    const html = new TextDecoder().decode(plain);
    document.open(); document.write(html); document.close();
  }catch(e){
    err.textContent = "パスワードが違います";
  }
}
document.getElementById("go").onclick = unlock;
document.getElementById("pw").addEventListener("keydown", e => { if(e.key === "Enter") unlock(); });
